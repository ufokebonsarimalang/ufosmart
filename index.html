<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi UFO Kebonsari</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --background: #f8fafc;
            --dark: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h2, h3 {
            margin-bottom: 20px;
            text-align: center;
            color: var(--dark);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled, .btn-disabled {
            background: #cbd5e1 !important;
            color: #94a3b8 !important;
            cursor: not-allowed;
        }

        /* Dashboard & Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box span {
            display: block;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-box label {
            font-size: 11px;
            color: #64748b;
        }

        .status-log {
            background: #f8fafc;
            border-left: 4px solid var(--primary);
            padding: 10px;
            margin: 15px 0;
            font-size: 14px;
            font-style: italic;
        }

        /* Modal Custom Styling */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }

        .modal-box {
            background: white;
            padding: 25px;
            border-radius: 16px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            animation: popUp 0.3s ease-out;
        }

        @keyframes popUp {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <div id="view-login">
        <h2>Absensi UFO Kebonsari</h2>
        <div class="form-group">
            <label for="login-nama">Nama Karyawan</label>
            <input type="text" id="login-nama" placeholder="Masukkan nama lengkap...">
        </div>
        <button onclick="prosesLogin()">Masuk Ke Dashboard</button>
    </div>

    <div id="view-dashboard" style="display: none;">
        <h3>Halo, <span id="nama-user">-</span> 👋</h3>
        
        <div class="stats-grid">
            <div class="stat-box">
                <span id="total-masuk">0 hari</span>
                <label>Masuk</label>
            </div>
            <div class="stat-box">
                <span id="total-off">0 hari</span>
                <label>OFF</label>
            </div>
            <div class="stat-box">
                <span id="total-ps">0 hari</span>
                <label>Potong Gaji</label>
            </div>
        </div>

        <div id="status-log" class="status-log">Memeriksa status absensi hari ini...</div>

        <button id="btn-checkin" class="btn-success" onclick="eksekusiAbsen('Check In')">CHECK IN (Masuk)</button>
        <button id="btn-checkout" class="btn-danger" onclick="eksekusiAbsen('Check Out')" disabled>CHECK OUT (Pulang)</button>
        <button id="btn-off" style="background: #64748b;" onclick="prosesAbsenOff()">AMBIL HARI OFF (LIBUR)</button>
        
        <button onclick="prosesLogout()" style="background: transparent; color: #64748b; margin-top: 20px; border: 1px solid #cbd5e1;">Log Out</button>
    </div>
</div>

<div id="modal-notif" class="modal-overlay">
    <div class="modal-box" id="modal-box">
        <h3 id="modal-title" style="margin-bottom: 10px;">Informasi</h3>
        <div id="modal-pesan" style="margin-bottom: 15px; color: #475569; font-size: 15px;"></div>
    </div>
</div>

<script>
    // GANTI DENGAN URL WEB APP GOOGLE APPS SCRIPT KAMU YANG SEBENARNYA
    const SCRIPT_URL = "https://script.google.com/macros/s/XXXXX/exec"; 

    // Variabel Global State Aplikasi
    let namaLogin = "";
    let totalHadir = 0;
    let totalOff = 0;
    let totalPs = 0;
    let lat = 0;
    let lng = 0;
    let isGpsValid = true; // Set true untuk demo, sesuaikan dengan validasi radius lokasi kamu

    // 1. FUNGSI RENDER STATISTIK KE LAYAR
    function tampilkanStatistik() {
        const elMasuk = document.getElementById('total-masuk');
        const elOff = document.getElementById('total-off');
        const elPs = document.getElementById('total-ps');

        if(elMasuk) elMasuk.innerText = totalHadir + " hari";
        if(elOff) elOff.innerText = totalOff + " hari";
        if(elPs) elPs.innerText = totalPs + " hari";
    }

    // 2. FUNGSI CUSTOM MODAL POPUP
    function tampilkanPesan(pesan, status) {
        document.getElementById('modal-title').innerText = status === 'sukses' ? 'Berhasil' : 'Info';
        document.getElementById('modal-pesan').innerHTML = `
            <p>${pesan}</p>
            <button onclick="tutupModal()" style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; margin-top: 15px; width: 100%;">TUTUP</button>
        `;
        document.getElementById('modal-notif').style.display = 'flex';
    }

    function tutupModal() {
        document.getElementById('modal-notif').style.display = 'none';
    }

    // 3. PROSES LOGIN
    function prosesLogin() {
        const inputNama = document.getElementById('login-nama').value.trim();
        if(!inputNama) {
            alert("Nama tidak boleh kosong!");
            return;
        }

        namaLogin = inputNama;

        // Simulasi Ambil Data Server / LocalStorage
        // Mengambil data terupdate dari localstorage (jika ada data offline sebelumnya) sebagai backup utama
        totalHadir = parseInt(localStorage.getItem(`totalHadir_${namaLogin}`)) || 0;
        totalOff = parseInt(localStorage.getItem(`totalOff_${namaLogin}`)) || 0;
        totalPs = parseInt(localStorage.getItem(`totalPs_${namaLogin}`)) || 0;

        // Tampilkan view dashboard
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-dashboard').style.display = 'block';
        document.getElementById('nama-user').innerText = namaLogin;

        // Tampilkan statistik & jalankan sistem validasi tombol
        tampilkanStatistik();
        cekValidasiHarian();

        // PENTING: Di project aslimu, di bagian fetch login, pastikan respon server 
        // memperbarui variabel totalHadir, totalOff, totalPs lalu panggil tampilkanStatistik() & localStorage.setItem!
    }

    // 4. VALIDASI TOMBOL HARIAN (MENCEGAH DOUBLE ABSEN)
    function cekValidasiHarian() {
        // Kunci utama agar statistik tidak kembali ke 0 saat fungsi ini dieksekusi ulang
        tampilkanStatistik();

        const tglSekarang = new Date().toDateString();
        const logAbsenHariIni = JSON.parse(localStorage.getItem(`absen_${namaLogin}`)) || {};

        if (logAbsenHariIni.tanggal !== tglSekarang) {
            localStorage.setItem(`absen_${namaLogin}`, JSON.stringify({ tanggal: tglSekarang, status: [] }));
            kunciTombolKerja(false);
            document.getElementById('btn-off').classList.remove('btn-disabled');
            document.getElementById('btn-off').disabled = false;
            return;
        }

        const status = logAbsenHariIni.status;

        if (status.includes('OFF')) {
            kunciTombolKerja(true);
            document.getElementById('btn-off').classList.add('btn-disabled');
            document.getElementById('btn-off').disabled = true;
            document.getElementById('status-log').innerText = "Status hari ini: OFF (Libur).";
        } else if (status.includes('Check Out')) {
            kunciTombolKerja(true);
            document.getElementById('btn-off').classList.add('btn-disabled');
            document.getElementById('btn-off').disabled = true;
            document.getElementById('status-log').innerText = "Terima kasih atas kerja keras Anda hari ini.";
        } else if (status.includes('Check In')) {
            document.getElementById('btn-checkin').classList.add('btn-disabled');
            document.getElementById('btn-checkin').disabled = true;
            
            document.getElementById('btn-off').classList.add('btn-disabled');
            document.getElementById('btn-off').disabled = true;
            
            if(isGpsValid) {
                document.getElementById('btn-checkout').classList.remove('btn-disabled');
                document.getElementById('btn-checkout').disabled = false;
            }
            document.getElementById('status-log').innerText = "Status: Sedang bekerja. Silakan Check Out saat pulang.";
        } else {
            if(isGpsValid) kunciTombolKerja(false);
        }
    }

    function kunciTombolKerja(status) {
        document.getElementById('btn-checkin').disabled = status;
        document.getElementById('btn-checkout').disabled = status;
        if(status) {
            document.getElementById('btn-checkin').classList.add('btn-disabled');
            document.getElementById('btn-checkout').classList.add('btn-disabled');
        } else {
            document.getElementById('btn-checkin').classList.remove('btn-disabled');
        }
    }

    // 5. PEMICU MODAL CUSTOM PILIHAN HARI OFF (ANTI-JADUL)
    function prosesAbsenOff() {
        document.getElementById('modal-title').innerText = 'Konfirmasi Libur';
        document.getElementById('modal-pesan').innerHTML = `
            <p>Apakah Anda yakin ingin mengambil hari OFF (Libur) hari ini?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="eksekusiAbsenOff()" style="background: var(--danger); margin: 0;">YA, LIBUR</button>
                <button onclick="tutupModal()" style="background: #e2e8f0; color: #334155; margin: 0;">BATAL</button>
            </div>
        `;
        document.getElementById('modal-notif').style.display = 'flex';
    }

    // 6. EKSEKUSI DATA OFF KE SERVER & LOCALSTORAGE
    function eksekusiAbsenOff() {
        tutupModal();
        const btn = document.getElementById('btn-off');
        btn.disabled = true;

        // Simulasi Request ke Google Sheets
        // Ganti dengan fetch(SCRIPT_URL, ...) asli milikmu
        setTimeout(() => {
            const logAbsenHariIni = JSON.parse(localStorage.getItem(`absen_${namaLogin}`)) || { status: [] };
            logAbsenHariIni.status.push('OFF');
            localStorage.setItem(`absen_${namaLogin}`, JSON.stringify(logAbsenHariIni));

            // PERBAIKAN BUG: Tambah nilai, kunci ke localStorage, lalu render ulang ke UI
            totalOff++;
            localStorage.setItem(`totalOff_${namaLogin}`, totalOff);
            
            tampilkanPesan("Berhasil mengambil hari OFF dan tercatat di sistem!", "sukses");
            cekValidasiHarian();
        }, 800);
    }

    // 7. EKSEKUSI CHECK IN / CHECK OUT
    function eksekusiAbsen(tipe) {
        const btn = tipe === 'Check In' ? document.getElementById('btn-checkin') : document.getElementById('btn-checkout');
        btn.disabled = true;

        // Simulasi Request ke Google Sheets
        // Ganti dengan fetch(SCRIPT_URL, ...) asli milikmu
        setTimeout(() => {
            const logAbsenHariIni = JSON.parse(localStorage.getItem(`absen_${namaLogin}`)) || { status: [] };
            logAbsenHariIni.status.push(tipe);
            localStorage.setItem(`absen_${namaLogin}`, JSON.stringify(logAbsenHariIni));

            // PERBAIKAN BUG: Jika check out, tambah total masuk, simpan aman ke localStorage browser
            if(tipe === 'Check Out') {
                totalHadir++;
                localStorage.setItem(`totalHadir_${namaLogin}`, totalHadir);
            }

            tampilkanPesan(`Berhasil melakukan ${tipe}!`, "sukses");
            cekValidasiHarian();
        }, 800);
    }

    // 8. LOGOUT
    function prosesLogout() {
        // Reset state variabel di memori ram
        namaLogin = "";
        totalHadir = 0;
        totalOff = 0;
        totalPs = 0;

        // Kembali ke Halaman Login
        document.getElementById('view-dashboard').style.display = 'none';
        document.getElementById('view-login').style.display = 'block';
        document.getElementById('login-nama').value = "";
    }
</script>

</body>
</html>
