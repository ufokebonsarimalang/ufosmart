<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Absensi Karyawan - UFO Kebonsari</title>
    <style>
        :root {
            --primary: #1967d2; /* Biru UFO */
            --primary-hover: #1557b0;
            --success: #1967d2; /* Check In sekarang Biru */
            --success-hover: #1557b0;
            --warning: #f59e0b; /* Check Out Jingga */
            --warning-hover: #d97706;
            --danger: #ef4444; /* Tombol OFF sekarang Merah */
            --danger-hover: #dc2626;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-muted: #757575;
            --border: #e0e0e0;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--background); 
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .box { 
            width: 100%;
            max-width: 360px; 
            background: var(--card-bg); 
            padding: 35px 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
            border: 1px solid rgba(0,0,0,0.03);
            text-align: center;
        }

        .box-admin { 
            max-width: 900px; 
        }

        .logo-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            border: 3px solid #eef2f6;
            padding: 3px;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-toko {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        h2 {
            margin: 0 0 5px 0;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .sub-title {
            color: var(--text-muted);
            font-size: 13px;
            margin: 0 0 25px 0;
            font-weight: 500;
        }

        .jam-digital {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            margin: 15px 0;
            font-variant-numeric: tabular-nums;
            letter-spacing: 1px;
        }

        .tanggal-digital {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* BTN GRID DENGAN IKON BARU */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-grid button svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333333;
        }

        input { 
            width: 100%; 
            padding: 12px 16px; 
            border-radius: 10px; 
            border: 1px solid var(--border);
            background: #ffffff;
            font-size: 15px;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(25, 103, 210, 0.1);
        }

        button { 
            width: 100%; 
            padding: 12px; 
            margin-top: 10px;
            border-radius: 8px; 
            font-size: 14px; 
            font-weight: 700; 
            cursor: pointer; 
            border: none;
            transition: all 0.2s ease;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

            color
